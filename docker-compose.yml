version: '3.8'

services:
  # 1. MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: mlflow_server
    ports:
      - "5002:5000"
    volumes:
      - ./mlflow_data:/mlflow_data
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*,localhost,127.0.0.1,0.0.0.0,mlflow_server,localhost:5000,mlflow_server:5000"
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "http://localhost:8888,http://127.0.0.1:8888,http://localhost:5000"
      MLFLOW_HTTP_AUTH_BACKEND: "None"
    command: >
      mlflow server 
      --backend-store-uri sqlite:////mlflow_data/mlflow.db 
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlflow_data/artifacts 
      --host 0.0.0.0 
      --port 5000
      --serve-artifacts
      --allowed-hosts "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. Prediction API (FastAPI)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ml_api
    depends_on:
      mlflow:
        condition: service_started
    ports:
      - "5001:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=my_sklearn_model
      - MODEL_STAGE=Production
    restart: on-failure

  # 3. Frontend UI (Streamlit)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamlit_ui
    depends_on:
      - api
    ports:
      - "5000:8501"
    environment:
      - API_URL=http://api:8000
    restart: always

networks:
  default:
    name: ml_project_network